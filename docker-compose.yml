services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gophkeeper
      POSTGRES_PASSWORD: gophkeeper
      POSTGRES_DB: gophkeeper
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gophkeeper-pgdata:/var/lib/postgresql/data

volumes:
  gophkeeper-pgdata:
